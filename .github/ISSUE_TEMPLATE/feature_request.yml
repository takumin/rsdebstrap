---
name: Feature request
description: Suggest an idea or enhancement for rsdebstrap
labels:
- enhancement
body:
- type: textarea
  id: problem
  attributes:
    label: Problem / motivation
    description: What problem are you trying to solve? Why is it needed?
  validations:
    required: true
- type: textarea
  id: solution
  attributes:
    label: Proposed solution
    description: Describe what you would like to happen.
  validations:
    required: true
- type: textarea
  id: alternatives
  attributes:
    label: Alternatives considered
  validations:
    required: false
- type: textarea
  id: context
  attributes:
    label: Additional context
  validations:
    required: false
