---
name: Release
on:
  workflow_call:
permissions: {}
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Setup aqua
      uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
      with:
        aqua_version: v2.62.0
    - name: Download artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: dist
        pattern: rsdebstrap-release-*
        merge-multiple: true
    - name: Check artifacts
      run: tree --charset ASCII dist/
    - name: Rename artifacts
      run: |-
        cd dist
        for f in ./*; do mv -n "$f" "${f/-release-/-}"; done
        sed -i -E 's/-release-/-/' ./*.sha256sum
    - name: Merge sha256sum
      run: |-
        cd dist
        echo -n > SHA256SUMS
        for f in $(find . -type f -name '*.sha256sum' -printf '%f\n' | sort); do
          < "$f" tee -a SHA256SUMS
          rm "$f"
        done
    - name: Verify sha256sum
      run: |-
        cd dist
        sha256sum -c SHA256SUMS
    - name: Check artifacts
      run: tree --charset ASCII dist/
    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |-
        gh release create "${VERSION}" --generate-notes dist/*
      env:
        VERSION: ${{ github.ref_name }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
