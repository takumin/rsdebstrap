---
name: Audit
on:
  workflow_call:
permissions: {}
concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  ##############################################################################
  # Audit
  ##############################################################################
  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Setup aqua
      uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
      with:
        aqua_version: v2.62.1
    - name: Restore cargo deps cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: deps-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |-
          deps-
        path: ~/.cargo/registry/
    - name: Restore rustup toolchain cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: rustup-${{ hashFiles('rust-toolchain.toml') }}
        restore-keys: |-
          rustup-
        path: ~/.rustup/
    # Policy (deterministic) and advisories (time-dependent) run as separate
    # steps rather than a single `task audit`. Both run on every PR and push to
    # main today, but keeping them split lets the advisory step be scoped
    # independently later — e.g. gated to dependency-changing PRs once declarative
    # path-filter tooling is in place — without disturbing the policy step.
    - name: Policy
      run: task audit:policy
    - name: Advisories
      run: task audit:advisories
