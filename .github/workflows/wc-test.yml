---
name: Test
on:
  workflow_call:
permissions: {}
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup aqua
      uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
      with:
        aqua_version: v2.62.0
    - name: Restore cargo deps cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: deps-${{ hashFiles('**/Cargo.lock') }}
        path: ~/.cargo/registry/
        restore-keys: deps-
    - name: Restore rustup cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: rustup-${{ hashFiles('rust-toolchain.toml') }}
        path: ~/.rustup/toolchains/
    - name: Restore test cache
      id: test-cache-restore
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: test-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}
        path: target/
        # No fallback on main: its saves must start from a clean slate so stale
        # artifacts never accrete into the shared cache.
        restore-keys: ${{ github.ref != 'refs/heads/main' && format('test-{0}-', hashFiles('rust-toolchain.toml')) || '' }}
    - name: Setup test
      run: |-
        task setup:test
    - name: Test
      run: |-
        task test
      env:
        CARGO_INCREMENTAL: '0'
    - name: Save test cache
      if: github.ref == 'refs/heads/main' && steps.test-cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: ${{ steps.test-cache-restore.outputs.cache-primary-key }}
        path: target/
