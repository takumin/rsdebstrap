---
# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

includes:
  tool: ./tasks/tool.task.yml
  setup: ./tasks/setup.task.yml
  format: ./tasks/format.task.yml
  schema: ./tasks/schema.task.yml
  reviewdog: ./tasks/reviewdog.task.yml
  audit: ./tasks/audit.task.yml
  test: ./tasks/test.task.yml
  doc: ./tasks/doc.task.yml
  build: ./tasks/build.task.yml
  release: ./tasks/release.task.yml

tasks:
  default:
    desc: '{{.TASK}}'
    silent: true
    aliases: [all]
    cmds:
    - task: tool
    - task: format
    - task: schema
    - task: reviewdog
    - task: audit:policy
    - task: test
    - task: doc
    - task: build
