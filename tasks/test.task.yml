---
# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

includes:
  setup:
    taskfile: setup.task.yml
    internal: true

tasks:
  default:
    desc: '{{.TASK}}'
    silent: true
    cmds:
    - task: test

  test:
    desc: '{{.TASK}}'
    label: test:workspace
    dir: '{{.ROOT_DIR}}'
    deps:
    - task: setup:test
    sources:
    - 'Cargo.toml'
    - 'Cargo.lock'
    - 'src/**/*.rs'
    - 'tests/**/*.rs'
    generates:
    - .task/.done_{{.TASK}}
    cmds:
    - cargo test --frozen --workspace
    # The schema-less build is a separate feature graph: a missed `cfg_attr` gate on a
    # schema derive only surfaces here, so CI must compile it too (AGENTS.md lists the
    # same command as part of the routine set).
    - cargo check --frozen --workspace --all-targets --no-default-features
    - cmd: touch .task/.done_{{.TASK}}
      silent: true
