---
# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

includes:
  setup:
    taskfile: setup.task.yml
    internal: true

tasks:
  default:
    desc: '{{.TASK}}'
    silent: true
    cmds:
    - task: test

  test:
    desc: '{{.TASK}}'
    label: test:workspace
    dir: '{{.ROOT_DIR}}'
    deps:
    - task: setup:test
    sources:
    - 'Cargo.toml'
    - 'Cargo.lock'
    - 'src/**/*.rs'
    - 'tests/**/*.rs'
    generates:
    - .task/.done_{{.TASK}}
    cmds:
    - cargo test --frozen --workspace
    # The schema-less build is a separate feature graph: a missed `cfg_attr` gate on a
    # schema derive only surfaces here, so CI must compile it too (AGENTS.md lists the
    # same command as part of the routine set).
    - cargo check --frozen --workspace --all-targets --no-default-features
    - cmd: touch .task/.done_{{.TASK}}
      silent: true

  non_root:
    desc: '{{.TASK}}'
    label: test:non_root
    dir: '{{.ROOT_DIR}}'
    deps:
    - task: setup:test
    cmds:
    # The two #[ignore]d tests assert permission-denied I/O rendering by making a
    # path unreadable/unwritable with chmod; as root those bits are bypassed, so the
    # operation succeeds and the assertion fails. Run them only as a non-root user.
    - cmd: |-
        if [ "$(id -u)" -eq 0 ]; then
          echo 'skipping #[ignore]d permission tests: they require a non-root user'
        else
          cargo test --frozen --workspace -- --ignored
        fi
      silent: true
